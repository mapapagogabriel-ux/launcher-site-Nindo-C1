<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel de Admin - Nindo Craft</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0a0a0c;
      --card-bg: rgba(20, 20, 23, 0.6);
      --chakra-orange: #ff5e00;
      --text-main: #f0d080;
      --text-dim: #a0a0a0;
      --danger: #e74c3c;
      --font-epic: 'Cinzel', serif;
      --font-system: 'Inter', sans-serif;
    }
    body {
      margin: 0;
      padding: 0;
      background: var(--bg-color);
      color: var(--text-main);
      font-family: var(--font-system);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      position: relative;
    }
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(10, 10, 12, 0.5) 0%, rgba(5, 5, 8, 0.9) 100%);
      z-index: -1;
    }
    .header {
      width: 100%;
      padding: 20px;
      background: var(--card-bg);
      text-align: center;
      border-bottom: 2px solid var(--chakra-orange);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
    }
    h1 { margin: 0; font-size: 28px; font-family: var(--font-epic); letter-spacing: 2px; text-shadow: 0 0 15px rgba(255, 94, 0, 0.4); }
    
    .container {
      width: 100%;
      max-width: 800px;
      padding: 40px 20px;
      box-sizing: border-box;
    }

    /* LOGIN SCREEN */
    #login-screen {
      background: var(--card-bg);
      padding: 40px;
      border-radius: 12px;
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      border: 1px solid rgba(255, 94, 0, 0.2);
    }
    .input-group {
      margin-bottom: 20px;
      text-align: left;
    }
    label { display: block; margin-bottom: 8px; font-size: 14px; color: var(--text-dim); }
    input {
      width: 100%;
      padding: 12px;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255, 94, 0, 0.5);
      color: white;
      border-radius: 6px;
      box-sizing: border-box;
      outline: none;
    }
    input:focus { border-color: var(--chakra-orange); box-shadow: 0 0 8px rgba(255, 94, 0, 0.3); }
    button {
      background: linear-gradient(135deg, #e07808 0%, var(--chakra-orange) 40%, #f5a623 100%);
      color: black;
      border: none;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.3s;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 0 15px rgba(255, 94, 0, 0.4); }
    .error { color: var(--danger); margin-top: 10px; display: none; }

    /* DASHBOARD */
    #dashboard { display: none; }
    
    .config-card {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 30px;
      border: 1px solid rgba(255, 94, 0, 0.3);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .mod-card {
      background: var(--card-bg);
      padding: 15px 20px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      border-left: 4px solid var(--chakra-orange);
    }
    .mod-info h3 { margin: 0 0 5px 0; font-size: 16px; }
    .mod-info p { margin: 0; font-size: 12px; color: var(--text-dim); word-break: break-all; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-danger:hover { box-shadow: 0 0 15px rgba(231, 76, 60, 0.4); }

    .add-mod-box {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      padding: 24px;
      border-radius: 12px;
      margin-top: 30px;
      border: 1px solid rgba(255, 94, 0, 0.3);
      text-align: center;
    }
    .add-mod-box h3 { font-family: var(--font-epic); font-size: 20px; margin-top: 0; }
    
    .file-input-wrapper {
      position: relative;
      margin: 20px 0;
      overflow: hidden;
      display: inline-block;
    }
    .file-input-wrapper input[type=file] {
      font-size: 100px;
      position: absolute;
      left: 0;
      top: 0;
      opacity: 0;
      cursor: pointer;
    }
    .file-input-btn {
      background: rgba(0,0,0,0.4);
      border: 1px dashed var(--chakra-orange);
      color: var(--text-main);
      padding: 20px 40px;
      border-radius: 8px;
      font-size: 16px;
      display: inline-block;
      transition: all 0.3s;
    }
    .file-input-wrapper:hover .file-input-btn {
      background: rgba(255, 94, 0, 0.1);
      box-shadow: 0 0 15px rgba(255, 94, 0, 0.2);
    }
    
    .status-bar {
      margin-top: 20px;
      padding: 15px;
      border-radius: 8px;
      background: rgba(39, 174, 96, 0.2);
      color: #2ecc71;
      border: 1px solid #27ae60;
      display: none;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Painel Administrativo</h1>
  </div>

  <div class="container">
    <!-- TELA DE LOGIN -->
    <div id="login-screen">
      <h2 style="margin-top:0;">Acesso Restrito</h2>
      <p style="color:var(--text-dim); margin-bottom: 30px;">Painel exclusivo da Staff Superior.</p>
      
      <div class="input-group">
        <label>Senha de Acesso</label>
        <input type="password" id="password" placeholder="Digite a senha...">
      </div>
      
      <div class="input-group">
        <label>GitHub Personal Access Token (PAT)</label>
        <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
      </div>

      <button onclick="login()">Entrar</button>
      <div id="login-error" class="error">Senha ou Token inválidos!</div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard">
      <div class="config-card">
        <div class="input-group" style="margin-bottom:0;">
          <label>Versão do Launcher</label>
          <input type="text" id="launcherVersion" value="1.0.0">
        </div>
        <div class="input-group" style="margin-bottom:0;">
          <label>URL Base dos Mods</label>
          <input type="text" id="baseUrlMods" value="https://mapapagogabriel-ux.github.io/launcher-site-Nindo-C1/mods/">
        </div>
      </div>

      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2>Lista de Mods</h2>
        <div style="display:flex; gap:10px;">
          <button onclick="removeAllMods()" class="btn-danger">Limpar Todos</button>
          <button onclick="saveToGitHub()" id="btn-save">Salvar Modificações</button>
        </div>
      </div>

      <div id="save-status" class="status-bar">Atualizado com sucesso no GitHub!</div>

      <div id="mods-list">
        <!-- Mods injetados via JS -->
      </div>

      <div class="add-mod-box">
        <h3>Adicionar Novo Mod</h3>
        <p style="font-size:13px; color:var(--text-dim); margin-bottom: 20px;">Selecione o arquivo .jar. O sistema enviará diretamente para o GitHub.</p>
        
        <div class="file-input-wrapper">
          <button class="file-input-btn" id="file-label">📁 Escolher Arquivos .jar</button>
          <input type="file" id="new-mod-file" accept=".jar,.zip" multiple onchange="document.getElementById('file-label').textContent = '📁 ' + (this.files.length > 1 ? this.files.length + ' Arquivos' : (this.files[0] ? this.files[0].name : 'Escolher Arquivos'))">
        </div>
        
        <br>
        <button onclick="uploadMod()" id="btn-upload" style="padding: 16px 32px; font-size: 16px;">Fazer Upload e Adicionar</button>
        <div id="upload-status" style="margin-top:15px; font-size:14px; color:var(--chakra-orange);"></div>
      </div>
    </div>
  </div>

  <script>
    const GITHUB_OWNER = 'MapapagoGabriel-UX';
    const GITHUB_REPO = 'launcher-site-Nindo-C1';
    const FILE_PATH = 'update.json';
    const CORRECT_PASS = 'NindoStaffsSuP1353433';
    
    let ghToken = '';
    let launcherData = {
      launcher_version: "1.0.0",
      base_url_mods: "https://mapapagogabriel-ux.github.io/launcher-site-Nindo-C1/mods/",
      mods: []
    };
    let updateJsonSha = null;

    // Recupera token salvo
    if (localStorage.getItem('ghToken')) {
      document.getElementById('gh-token').value = localStorage.getItem('ghToken');
    }

    async function login() {
      const pass = document.getElementById('password').value;
      const token = document.getElementById('gh-token').value;

      if (pass !== CORRECT_PASS) {
        showError('Senha incorreta!');
        return;
      }
      if (!token) {
        showError('Você precisa informar o Token do GitHub!');
        return;
      }

      ghToken = token;
      localStorage.setItem('ghToken', token);
      
      try {
        const response = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${FILE_PATH}`, {
          headers: {
            'Authorization': `token ${ghToken}`,
            'Accept': 'application/vnd.github.v3+json'
          },
          cache: "no-store"
        });

        if (response.status === 404) {
          showDashboard();
          return;
        }

        if (!response.ok) throw new Error('Falha de permissão no Token');

        const data = await response.json();
        updateJsonSha = data.sha;
        
        const content = decodeURIComponent(escape(window.atob(data.content)));
        launcherData = JSON.parse(content);
        
        if (launcherData.launcher_version) document.getElementById('launcherVersion').value = launcherData.launcher_version;
        if (launcherData.base_url_mods) document.getElementById('baseUrlMods').value = launcherData.base_url_mods;
        if (!launcherData.mods) launcherData.mods = [];

        showDashboard();
      } catch (err) {
        console.error(err);
        showError('Erro ao acessar o GitHub. O Token é válido e tem permissão "repo"?');
      }
    }

    function showError(msg) {
      const errEl = document.getElementById('login-error');
      errEl.textContent = msg;
      errEl.style.display = 'block';
    }

    function showDashboard() {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      renderMods();
    }

    function renderMods() {
      const list = document.getElementById('mods-list');
      list.innerHTML = '';

      if (launcherData.mods.length === 0) {
        list.innerHTML = '<p style="color:var(--text-dim)">Nenhum mod cadastrado ainda.</p>';
        return;
      }

      launcherData.mods.forEach((modName, index) => {
        list.innerHTML += `
          <div class="mod-card">
            <div class="mod-info">
              <h3>${modName}</h3>
              <p>${document.getElementById('baseUrlMods').value}${modName}</p>
            </div>
            <button class="btn-danger" onclick="removeMod(${index})">Remover</button>
          </div>
        `;
      });
    }

    function removeMod(index) {
      if (confirm('Tem certeza que deseja remover este mod da lista?')) {
        launcherData.mods.splice(index, 1);
        renderMods();
      }
    }

    function removeAllMods() {
      if (confirm('Tem certeza que deseja apagar todos os mods da lista?')) {
        launcherData.mods = [];
        renderMods();
      }
    }

    async function uploadMod() {
      const fileInput = document.getElementById('new-mod-file');
      const files = fileInput.files;
      
      if (!files || files.length === 0) return alert("Selecione pelo menos um arquivo!");
      
      const btn = document.getElementById('btn-upload');
      const statusText = document.getElementById('upload-status');
      btn.disabled = true;

      try {
        for(let i = 0; i < files.length; i++) {
          const file = files[i];
          btn.textContent = `Enviando ${i+1}/${files.length}...`;
          statusText.textContent = `Processando: ${file.name}`;

          const base64Content = await new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => {
              const b64 = reader.result.split(',')[1];
              resolve(b64);
            };
            reader.onerror = error => reject(error);
          });

          statusText.textContent = `Fazendo upload de ${file.name} para a pasta mods/...`;

          const modPath = `mods/${file.name}`;
          let fileSha = null;
          try {
            const checkRes = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${modPath}`, {
              headers: { 'Authorization': `token ${ghToken}` },
              cache: "no-store"
            });
            if (checkRes.ok) {
              const checkData = await checkRes.json();
              fileSha = checkData.sha;
            }
          } catch (e) {}

          const body = {
            message: `Upload mod: ${file.name}`,
            content: base64Content
          };
          if (fileSha) body.sha = fileSha;

          const uploadRes = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${modPath}`, {
            method: 'PUT',
            headers: {
              'Authorization': `token ${ghToken}`,
              'Accept': 'application/vnd.github.v3+json',
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(body)
          });

          if (!uploadRes.ok) {
            const errData = await uploadRes.json();
            throw new Error(`Falha no upload de ${file.name}: ` + (errData.message || 'Erro desconhecido'));
          }

          if (!launcherData.mods.includes(file.name)) {
            launcherData.mods.push(file.name);
          }
        }
        
        statusText.textContent = 'Salvando update.json...';
        await saveToGitHub();

        statusText.textContent = '';
        fileInput.value = '';
        document.getElementById('file-label').textContent = '📁 Escolher Arquivos .jar';
        alert(`${files.length} mod(s) enviado(s) com sucesso!`);
      } catch (err) {
        console.error(err);
        alert(err.message || 'Erro ao enviar os mods!');
        statusText.textContent = 'Erro no envio.';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Fazer Upload e Adicionar';
        renderMods();
      }
    }

    async function saveToGitHub() {
      const btn = document.getElementById('btn-save');
      btn.disabled = true;
      btn.textContent = 'Salvando...';
      const statusBar = document.getElementById('save-status');
      statusBar.style.display = 'none';

      launcherData.launcher_version = document.getElementById('launcherVersion').value.trim();
      launcherData.base_url_mods = document.getElementById('baseUrlMods').value.trim();

      const jsonStr = JSON.stringify(launcherData, null, 2);
      const contentEncoded = btoa(unescape(encodeURIComponent(jsonStr)));

      try {
        const body = {
          message: `Atualizando configs via Painel (${launcherData.launcher_version})`,
          content: contentEncoded
        };
        if (updateJsonSha) body.sha = updateJsonSha;

        const uploadRes = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${FILE_PATH}`, {
          method: 'PUT',
          headers: {
            'Authorization': `token ${ghToken}`,
            'Accept': 'application/vnd.github.v3+json',
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(body)
        });

        if (!uploadRes.ok) {
          const errData = await uploadRes.json();
          throw new Error('Falha ao atualizar JSON: ' + (errData.message || 'Erro desconhecido'));
        }

        const successData = await uploadRes.json();
        updateJsonSha = successData.content.sha;

        statusBar.style.display = 'block';
        setTimeout(() => statusBar.style.display = 'none', 3000);
      } catch (err) {
        console.error(err);
        alert(err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Salvar Modificações';
      }
    }
  </script>
</body>
</html>
